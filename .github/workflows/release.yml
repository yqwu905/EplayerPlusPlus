name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.7.2'

jobs:
  # ============================================================
  # Build for Windows
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120

      - name: Deploy Qt (windeployqt)
        shell: pwsh
        run: |
          $exePath = "build/src/${{ env.BUILD_TYPE }}/ImageCompare.exe"
          if (-not (Test-Path $exePath)) {
            $exePath = "build/src/ImageCompare.exe"
          }
          New-Item -ItemType Directory -Force -Path "deploy"
          Copy-Item $exePath "deploy/"
          windeployqt --release --no-translations --no-opengl-sw "deploy/ImageCompare.exe"

      # ----------------------------------------------------------------
      # Optional: sign deploy/ImageCompare.exe BEFORE it gets packaged
      # into both the .zip portable and the Inno Setup installer, so the
      # signed binary appears in every distribution channel.
      #
      # Activated once SignPath OSS approves this project and these two
      # repo settings are filled in:
      #   • Variable  ENABLE_SIGNING        = "true"
      #   • Variable  SIGNPATH_ORG_ID       = <org GUID from SignPath>
      #   • Secret    SIGNPATH_API_TOKEN    = <CI user API token>
      # The SignPath project slug + policy slug below default to
      # "imagecompare" / "release-signing" — adjust if your SignPath
      # project uses different names.
      # ----------------------------------------------------------------
      - name: Upload unsigned ImageCompare.exe for signing
        id: upload-unsigned-exe
        if: vars.ENABLE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ImageCompare-exe
          path: deploy/ImageCompare.exe

      - name: Sign ImageCompare.exe via SignPath
        if: vars.ENABLE_SIGNING == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: imagecompare
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned-exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-exe

      - name: Replace deploy ImageCompare.exe with signed copy
        if: vars.ENABLE_SIGNING == 'true'
        shell: pwsh
        run: Copy-Item -Force signed-exe/ImageCompare.exe deploy/ImageCompare.exe

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "deploy/*" -DestinationPath "ImageCompare-windows-x64.zip"

          $appName = "ImageCompare"
          $appVersion = "0.1.${{ github.run_number }}"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -match '^v(.*)$') {
            $appVersion = $Matches[1]
          }

          # Inno Setup wants a 4-part numeric VersionInfoVersion. Strip any
          # pre-release suffix (e.g. v0.2.0-beta1 → 0.2.0) and pad to 4 parts.
          if ($appVersion -match '^([0-9]+(?:\.[0-9]+){0,3})') {
            $numeric = $Matches[1]
            $parts = $numeric.Split('.')
            while ($parts.Length -lt 4) { $parts += '0' }
            $versionInfo = ($parts[0..3] -join '.')
          } else {
            $versionInfo = '0.0.0.0'
          }

          $publisher    = "wuyuanqing"
          $publisherUrl = "https://github.com/yqwu905/EplayerPlusPlus"
          # Stable AppId — must NEVER change once published, otherwise Windows
          # treats new builds as a different app, breaking upgrades AND
          # forcing SmartScreen to re-accumulate reputation from scratch.
          $appId        = "{{E09282BF-72E4-428D-9293-D7AE12C21753}"

          $issContent = @"
          [Setup]
          AppId=$appId
          AppName=$appName
          AppVersion=$appVersion
          AppPublisher=$publisher
          AppPublisherURL=$publisherUrl
          AppSupportURL=$publisherUrl/issues
          AppUpdatesURL=$publisherUrl/releases
          AppCopyright=Copyright (C) 2026 $publisher
          VersionInfoVersion=$versionInfo
          VersionInfoCompany=$publisher
          VersionInfoProductName=$appName
          VersionInfoDescription=$appName Setup
          DefaultDirName={autopf}\$appName
          DefaultGroupName=$appName
          OutputDir=.
          OutputBaseFilename=${appName}-windows-x64-installer
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          WizardStyle=modern
          SetupIconFile=resources\icons\app.ico
          UninstallDisplayIcon={app}\${appName}.exe
          UninstallDisplayName=$appName

          [Files]
          Source: "deploy\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\$appName"; Filename: "{app}\${appName}.exe"
          Name: "{autodesktop}\$appName"; Filename: "{app}\${appName}.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop icon"; GroupDescription: "Additional icons:"
          "@

          Set-Content -Path "installer.iss" -Value $issContent
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      # Sign the Inno Setup installer itself. Same activation gates as
      # the earlier ImageCompare.exe signing step.
      - name: Upload unsigned installer for signing
        id: upload-unsigned-installer
        if: vars.ENABLE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: ImageCompare-windows-x64-installer.exe

      - name: Sign installer via SignPath
        if: vars.ENABLE_SIGNING == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: imagecompare
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Replace installer with signed copy
        if: vars.ENABLE_SIGNING == 'true'
        shell: pwsh
        run: Copy-Item -Force signed-installer/ImageCompare-windows-x64-installer.exe ImageCompare-windows-x64-installer.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageCompare-windows-x64
          path: |
            ImageCompare-windows-x64.zip
            ImageCompare-windows-x64-installer.exe

  # ============================================================
  # Build for macOS
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtimageformats'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Deploy Qt (macdeployqt)
        run: |
          APP_PATH="build/src/ImageCompare.app"
          if [ ! -d "$APP_PATH" ]; then
            # If not built as a .app bundle, create one manually
            mkdir -p deploy/ImageCompare.app/Contents/MacOS
            cp build/src/ImageCompare deploy/ImageCompare.app/Contents/MacOS/
            cat > deploy/ImageCompare.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>ImageCompare</string>
            <key>CFBundleIdentifier</key>
            <string>com.eplayerplusplus.imagecompare</string>
            <key>CFBundleName</key>
            <string>ImageCompare</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF
            APP_PATH="deploy/ImageCompare.app"
          fi
          macdeployqt "$APP_PATH" -dmg
          # Find the dmg file
          DMG_FILE=$(find . -name "*.dmg" -maxdepth 3 | head -1)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" ImageCompare-macos-x64.dmg
          else
            # Fallback: create a zip from the .app bundle
            cd $(dirname "$APP_PATH")
            zip -r "$GITHUB_WORKSPACE/ImageCompare-macos-x64.zip" $(basename "$APP_PATH")
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageCompare-macos-x64
          path: |
            ImageCompare-macos-x64.dmg
            ImageCompare-macos-x64.zip

  # ============================================================
  # Build for Linux
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libfuse2 \
            file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: 'qtimageformats'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Package (AppImage)
        run: |
          # Install linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/src/ImageCompare AppDir/usr/bin/

          # Create .desktop file
          cat > AppDir/usr/share/applications/imagecompare.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=ImageCompare
          Exec=ImageCompare
          Icon=imagecompare
          Categories=Graphics;
          Comment=Cross-platform image comparison tool
          EOF

          # Copy desktop file to AppDir root (required by linuxdeployqt)
          cp AppDir/usr/share/applications/imagecompare.desktop AppDir/

          # Create a simple icon if none exists
          if [ -f resources/icons/app.png ]; then
            cp resources/icons/app.png AppDir/usr/share/icons/hicolor/256x256/apps/imagecompare.png
          else
            # Generate a placeholder icon
            convert -size 256x256 xc:#4A90D9 -gravity center \
              -pointsize 48 -fill white -annotate 0 "IC" \
              AppDir/usr/share/icons/hicolor/256x256/apps/imagecompare.png 2>/dev/null || \
            python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (74, 144, 217, 255))
          img.save('AppDir/usr/share/icons/hicolor/256x256/apps/imagecompare.png')
          " 2>/dev/null || \
            # Minimal valid PNG as last resort
            echo -n "" > AppDir/usr/share/icons/hicolor/256x256/apps/imagecompare.png
          fi
          cp AppDir/usr/share/icons/hicolor/256x256/apps/imagecompare.png AppDir/imagecompare.png 2>/dev/null || true

          # Run linuxdeployqt
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/bin/ImageCompare -appimage -qmake=$(which qmake) || true

          # Find the AppImage
          APPIMAGE_FILE=$(find . -maxdepth 1 -name "*.AppImage" -not -name "linuxdeployqt*" | head -1)
          if [ -n "$APPIMAGE_FILE" ]; then
            mv "$APPIMAGE_FILE" ImageCompare-linux-x64.AppImage
          else
            # Fallback: package as tar.gz
            tar czf ImageCompare-linux-x64.tar.gz -C build/src ImageCompare
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageCompare-linux-x64
          path: |
            ImageCompare-linux-x64.AppImage
            ImageCompare-linux-x64.tar.gz

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ImageCompare ${{ github.ref_name }}

            Cross-platform image comparison tool.

            ### Downloads
            - **Windows**: `ImageCompare-windows-x64-installer.exe` (Installer) or `.zip` (Portable)
            - **macOS**: `ImageCompare-macos-x64.dmg` or `.zip`
            - **Linux**: `ImageCompare-linux-x64.AppImage` or `.tar.gz`
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
